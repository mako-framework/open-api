openapi: 3.0.0
info:
  title: 'Example API'
  version: 1.0.0
paths:
  /articles/{articleId}/{slug}:
    parameters:
      - name: articleId
        in: path
        required: true
        schema:
          type: integer
          format: auto-increment
      - name: slug
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: app\http\controllers\ArticlesGet
      parameters:
        - name: slug
          in: path
          required: false
          schema:
            type: string
        - name: preview
          in: query
          required: false
          schema:
              type: boolean
      responses:
        '200':
          description: 'root:get'

